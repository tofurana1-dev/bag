<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nepal Bags Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>👜 Nepal Bags Store</h1>
    <nav>
        <a href="#">Home</a>
        <a href="#">Shop</a>
        <a href="#">Contact</a>
        <a href="#" id="cartBtn">Cart (<span id="cartCount">0</span>)</a>
    </nav>
</header>

<section class="hero">
    <h2>Stylish Bags for Every Journey 🇳🇵</h2>
    <p>Affordable | Durable | Trendy</p>
</section>

<section class="products">
    <div class="card">
        <img src="https://via.placeholder.com/200" alt="Backpack">
        <h3>Travel Backpack</h3>
        <p>Rs. 2500</p>
        <button onclick="addToCart()">Add to Cart</button>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/200" alt="Handbag">
        <h3>Leather Handbag</h3>
        <p>Rs. 3200</p>
        <button onclick="addToCart()">Add to Cart</button>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/200" alt="School Bag">
        <h3>School Bag</h3>
        <p>Rs. 1800</p>
        <button onclick="addToCart()">Add to Cart</button>
    </div>
</section>

<footer>
    <p>© 2026 Nepal Bags Store | Made for Nepali Market 🇳🇵</p>
</footer>

<script src="script.js"></script>
</body>
</html>
